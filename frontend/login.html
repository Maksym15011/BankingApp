<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logowanie - Bank Polski</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <h1>NOVA BANK</h1>

        <p>Zaloguj się do swojego konta</p>

        <input type="email" id="email" placeholder="Email" />

        <input type="password" id="password" placeholder="Hasło" />

        <button onclick="login()">Zaloguj</button>

        <a href="register.html"> Nie masz konta? Zarejestruj się </a>
      </div>
    </div>

    <script src="js/auth.js"></script>

    <footer class="footer">
      <div class="footer-content">
        <h3>Bank Polski Online</h3>

        <p>
          Projekt edukacyjny stworzony w ramach przedmiotów Banking oraz Web
          Development.
        </p>

        <p>
          System przeznaczony wyłącznie do celów demonstracyjnych. Nie jest
          prawdziwym bankiem.
        </p>
      </div>
    </footer>
  </body>
</html>
