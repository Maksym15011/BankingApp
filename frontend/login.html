<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logowanie - Bank Polski</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <i class="fa-solid fa-building-columns"></i>
        </div>

        <h1 class="auth-title">NOVA BANK</h1>

        <p class="auth-subtitle">Nowoczesna bankowość online</p>

        <div class="auth-form">
          <input type="email" id="email" placeholder="Email" />

          <input type="password" id="password" placeholder="Hasło" />

          <button class="auth-btn" onclick="login()">Zaloguj się</button>
        </div>

        <div class="auth-link">
          Nie masz konta?

          <a href="register.html"> Zarejestruj się </a>
        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
